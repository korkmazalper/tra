<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Recommendation App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .search-container { margin-bottom: 20px; }
        input { padding: 10px; width: 250px; font-size: 16px; }
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; background-color: #007BFF; color: white; border: none; margin-left: 5px; }
        button#btnClear { background-color: #6c757d; }
        .result-card { background: white; padding: 15px; margin-top: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .result-card img { max-width: 100%; height: auto; border-radius: 5px; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <h1>Travel Recommendation System</h1>
    
    <div class="search-container">
        <input type="text" id="searchKeyword" placeholder="Enter keyword (e.g., beach, temple, country)...">
        <button id="btnSearch">Search</button>
        <button id="btnClear">Clear</button>
    </div>

    <div id="recommendationResults"></div>

    <script src="travel_recommendation.js"></script>
</body>
</html>
